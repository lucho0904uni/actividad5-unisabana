name: perf-tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        scenario: [smoke, baseline, load, stress, spike, soak]
      max-parallel: 2
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup k6
        uses: grafana/setup-k6-action@v4

      - name: Install dependencies
        run: npm install

      - name: Run ${{ matrix.scenario }} test
        run: npm run test:${{ matrix.scenario }}

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ matrix.scenario }}
          path: perf/results/${{ matrix.scenario }}.json
          if-no-files-found: warn
