name: k6 Performance Tests

on:
  push: {}
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        scenario: [smoke, baseline, load, stress, spike, soak]
      max-parallel: 2
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.49.0'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run ${{ matrix.scenario }} test
        id: test
        continue-on-error: true
        timeout-minutes: 120
        run: npm run test:${{ matrix.scenario }}
      
      - name: Verify results file exists
        if: always()
        run: |
          if [ -f "perf/results/${{ matrix.scenario }}.json" ]; then
            echo "Results file created successfully"
          else
            echo "Results file not found - test may have failed"
          fi
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.scenario }}
          path: perf/results/${{ matrix.scenario }}.json
          if-no-files-found: warn
