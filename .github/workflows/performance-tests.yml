name: Complete Test Suite

on:
  push:
    branches: [ main ]
    paths:
      - 'perf/**'
      - 'data/**'
      - 'scenarios/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.49.0'
      - run: npm install
      - run: npm run test:smoke
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-results
          path: perf/results/smoke.json
          if-no-files-found: warn

  baseline-test:
    name: Baseline Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.49.0'
      - run: npm install
      - run: npm run test:baseline
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: baseline-results
          path: perf/results/baseline.json
          if-no-files-found: warn

  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.49.0'
      - run: npm install
      - run: npm run test:load
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: load-results
          path: perf/results/load.json
          if-no-files-found: warn

  stress-test:
    name: Stress Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.49.0'
      - run: npm install
      - run: npm run test:stress
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: stress-results
          path: perf/results/stress.json
          if-no-files-found: warn

  spike-test:
    name: Spike Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.49.0'
      - run: npm install
      - run: npm run test:spike
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: spike-results
          path: perf/results/spike.json
          if-no-files-found: warn

  soak-test:
    name: Soak Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.49.0'
      - run: npm install
      - run: npm run test:soak
        continue-on-error: true
        timeout-minutes: 180
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: soak-results
          path: perf/results/soak.json
          if-no-files-found: warn

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [smoke-test, baseline-test, load-test, stress-test, spike-test, soak-test]
    if: always()
    steps:
      - uses: actions/checkout@v3
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate summary
        run: |
          echo "## Test Execution Summary" > summary.md
          echo "" >> summary.md
          echo "**Execution Time**: $(date -u)" >> summary.md
          echo "" >> summary.md
          echo "### Completed Tests:" >> summary.md
          echo "" >> summary.md
          if [ -d artifacts ]; then
            for item in artifacts/*; do
              if [ -e "$item" ]; then
                echo "- $(basename "$item")" >> summary.md
              fi
            done
          else
            echo "- No artifacts were found." >> summary.md
          fi
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('summary.md')) {
              const summary = fs.readFileSync('summary.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }

